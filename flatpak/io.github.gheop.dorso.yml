app-id: io.github.gheop.dorso
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: dorso

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --device=all               # V4L2 camera access
  - --share=network            # MediaPipe model download
  - --talk-name=org.kde.StatusNotifierWatcher  # Tray icon (SNI)

modules:
  - name: python3-setuptools
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} setuptools
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/90/99/158ad0609729111163fc1f674a5a42f2605371a4cf036d0441070e2f7455/setuptools-78.1.1-py3-none-any.whl
        sha256: c3a9c4211ff4c309edb8b8c4f1cbfa7ae324c4ba9f91ff254e3d305b9fd54561

  - python-deps.json

  - name: dorso
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links . --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/io.github.gheop.dorso.desktop ${FLATPAK_DEST}/share/applications/io.github.gheop.dorso.desktop
      - install -Dm644 data/io.github.gheop.dorso.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.gheop.dorso.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.gheop.dorso.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.gheop.dorso.svg
    sources:
      - type: dir
        path: ..
