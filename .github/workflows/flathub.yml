name: Update Flathub

on:
  release:
    types: [published]

jobs:
  update-flathub:
    if: "!github.event.release.prerelease"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute release archive hash
        id: hash
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.event.release.tag_name }}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Clone Flathub repo
        run: |
          git clone https://x-access-token:${{ secrets.FLATHUB_TOKEN }}@github.com/flathub/io.github.gheop.dorso.git flathub-repo

      - name: Update manifest
        run: |
          cd flathub-repo
          # Copy latest manifest and metadata from this repo
          cp ../flatpak/io.github.gheop.dorso.yml .
          cp ../flatpak/python-deps.json .
          cp ../data/io.github.gheop.dorso.metainfo.xml .

          # Patch source to point to release tarball instead of local dir
          python3 -c "
          import yaml, sys
          with open('io.github.gheop.dorso.yml') as f:
              m = yaml.safe_load(f)
          for mod in m['modules']:
              if isinstance(mod, dict) and mod.get('name') == 'dorso':
                  mod['sources'] = [{
                      'type': 'archive',
                      'url': '${{ steps.hash.outputs.url }}',
                      'sha256': '${{ steps.hash.outputs.sha256 }}'
                  }]
          with open('io.github.gheop.dorso.yml', 'w') as f:
              yaml.dump(m, f, default_flow_style=False, sort_keys=False)
          "

      - name: Push to Flathub
        run: |
          cd flathub-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          VERSION="${{ github.event.release.tag_name }}"
          git commit -m "Update to ${VERSION}"
          git push
