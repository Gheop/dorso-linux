name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check dorso/

  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository-2.0-dev gir1.2-gtk-4.0 gettext libcairo2-dev python3-dev pkg-config libdbus-1-dev
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --cov=dorso --cov-report=xml -k "not test_onboarding and not test_settings_window"
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          use_oidc: true
          fail_ci_if_error: false

  test-gtk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository-2.0-dev gir1.2-gtk-4.0 gettext libcairo2-dev python3-dev pkg-config libdbus-1-dev xvfb
      - run: pip install -e ".[dev]"
      - name: Run GTK tests with virtual display
        run: xvfb-run pytest tests/ -v --tb=short --junitxml=test-results.xml
      - name: Extract test count
        if: github.ref == 'refs/heads/main'
        id: tests
        run: |
          count=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('test-results.xml').getroot().attrib['tests'])")
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - name: Update test count badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 288bd95bf4e2365bb869bd34dd268359
          filename: dorso-linux-badges.json
          label: tests
          message: ${{ steps.tests.outputs.count }} passed
          color: brightgreen

  locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Validate all .po files
        run: |
          for po in locales/*/LC_MESSAGES/dorso.po; do
            echo "Checking $po..."
            msgfmt --check "$po" -o /dev/null
          done

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate metadata.json
        run: |
          python3 -c "
          import json, sys
          meta = json.load(open('gnome-extension/metadata.json'))
          for k in ['uuid', 'name', 'description', 'shell-version', 'version']:
              assert k in meta, f'Missing key: {k}'
          print('metadata.json OK')
          "
      - name: Check extension.js syntax
        run: node --check gnome-extension/extension.js
