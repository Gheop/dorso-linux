<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4CAF50"/>
  <!-- Sitting person silhouette (good posture) -->
  <g fill="#fff">
    <!-- Head -->
    <circle cx="64" cy="28" r="10"/>
    <!-- Torso (upright) -->
    <rect x="58" y="38" width="12" height="32" rx="4"/>
    <!-- Upper legs (seated, horizontal) -->
    <rect x="48" y="68" width="32" height="11" rx="4"/>
    <!-- Lower legs (vertical, hanging down) -->
    <rect x="48" y="77" width="11" height="24" rx="4"/>
    <!-- Chair back suggestion -->
    <rect x="72" y="42" width="8" height="38" rx="3" opacity="0.4"/>
  </g>
</svg>
